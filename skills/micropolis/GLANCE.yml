# GLANCE.yml — micropolis
# Status: IMPLEMENTING
# 🏙️ "The engine is the microworld. The CLI is the public gate."

status: implementing

what: |
  Parent MicropolisCore skill for humans, LLMs, CLI users, browser UI,
  content tools, and adapters that need to inspect, analyze, visualize,
  simulate, edit, render, package, or command Micropolis worlds.

why: |
  The unified `micropolis` CLI and its TypeScript modules are the public
  gate into the microworld. Browser renderers, command bus, Git timelines,
  content catalogs, and MOOLLM tutors compose around that gate.

k_lines:
  activates:
    - MICROPOLIS
    - MICROPOLIS-ENGINE
    - SIMCITY
    - CITY-FILE
    - CTY-FORMAT
    - MICROPOLIS-CLI
    - MICROPOLIS-RENDERER
    - CONTENT-CATALOG
    - CLIENT-RENDERED-PREVIEW
    - MICROWORLD
    - CONSTRUCTIONISM

interfaces:
  cli: "micropolis/cli/entry.ts"
  modules: "micropolis/cli"
  constants: "micropolis/cli/constants/constants.js"
  engine: "MicropolisEngine/src"
  wasm_wrapper: "micropolis/src/lib/MicropolisSimulator.ts"
  reactive_bridge: "micropolis/src/lib/MicropolisReactive.svelte.ts"
  wasm_loaders: "micropolis/src/lib/wasm"
  renderers: "micropolis/src/lib/*TileRenderer.ts"
  renderer_roadmap: "designs/renderer-plugin-roadmap.md"
  moollm_integration: "designs/moollm-micropolis-integration.md"
  sim_ensemble_bridge: "/Users/a2deh/GroundUp/Leela/git/moollm/designs/sim-obliterator"
  vitamoo_typescript: "/Users/a2deh/GroundUp/Leela/git/SimObliterator_Suite/vitamoo/docs/OBLITERATOR-TYPESCRIPT.md"
  command_bus: "micropolis/cli/bus/index.ts"

delegate_to:
  command_bus: "Live UI, pie menu, chat, LLM proposal, command dispatch"
  github: "GitHub-as-MMORPG external operations"
  experiment: "Batch simulation and evaluation loops"
  constructionism: "Educational framing"
  mooco: "Future orchestration, catalog services, and adapter hosting"
  sim_obliterator: "Sims save/object/character bridge, uplift/download, IFF layers"
  character: "MOOLLM CHARACTER.yml and Sims personality bridge"
  mind_mirror: "Personality modeling beyond The Sims trait surface"

invoke_when:
  - "Working with Micropolis engine or city files"
  - "Using the Micropolis CLI"
  - "Designing save-file, batch simulation, or city-analysis tools"
  - "Designing renderer plugins, catalog previews, or content-management workflows"
  - "Connecting Micropolis with The Sims, VitaMoo, SimObliterator, or MOOLLM characters"
  - "Creating AI-accessible city commands"
  - "Factoring Micropolis capabilities into sub-skills"

see_also:
