  extended_save_format_roadmap:
    status: planned
    do_not_implement_yet: true
    goal: "Classic binary city plus extensible layered document."
    principle: |
      Preserve classic .cty/.mop compatibility, but allow a surrounding
      document/package to capture dynamic state, user-authored layers,
      multiplayer governance, AI tutor context, and replay metadata.
    possible_shapes:
      sidecar_directory: "city.cty + city.layers/..."
      city_package_directory: "cities/<city-id>/ with CITY.yml, <city-id>.cty, layers/, timeline/, metadata.yml"
      branch_object_store: "micropolis_<id> branch with MICROPOLIS.yml and plural collection namespaces such as cities/, macros/, blueprints/, tools/, issues/"
      zip_bundle: "single shareable archive containing classic save and sidecars"
      git_tree: "directory optimized for diffs, branches, PRs, and classroom ownership"
    layer_types:
      dynamic_analysis:
        examples: [populationDensityMap, trafficDensityMap, pollutionDensityMap, landValueMap, crimeRateMap, powerGridMap, rateOfGrowthMap, fireStationEffectMap, policeStationEffectMap]
        purpose: "Capture runtime maps directly instead of recomputing when appropriate."
      user_layers:
        examples: [chalk, labels, signs, annotations, named-regions, routes, screenshots, image-overlays]
        purpose: "Let players and teachers author meaning on top of the city."
      behavior_layers:
        examples: [tool-scripts, agent-behaviors, zone-plugins, scenario-courseware, visual-programming-blocks]
        purpose: "Move from player to author without patching engine core."
      multiplayer_layers:
        examples: [proposals, votes, unresolved-dialogs, role-assignments, permissions, chat-threads]
        purpose: "Persist governance state, not just map state."
      llm_layers:
        examples: [tutor-messages, command-proposals, explanations, approvals, rejected-actions, skill-context, audit-logs]
        purpose: "Make AI collaboration inspectable and replayable."
      provenance_layers:
        examples: [authors, timestamps, branch-ancestry, parent-checkpoints, learning-goals, citations]
        purpose: "Support Git multiverse, classroom review, and scientific reproducibility."
    compatibility:
      read_classic_first: true
      unknown_layers: "preserve and ignore by default"
      write_policy: "do not mutate classic .cty unless explicitly requested"

