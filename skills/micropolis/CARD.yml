# CARD.yml — Micropolis Engine

card:
  id: micropolis
  name: "Micropolis Engine"
  type: [skill, simulation, engine, cli, save-file, wasm, renderer, content-management, education, microworld]
  emoji: 🏙️
  tier: 2
  status: implementing
  rarity: legendary
  tagline: "The engine is the microworld. The CLI is the public gate."
  description: |
    Parent interface for MicropolisCore. The unified CLI exposes city files,
    terminal visualization, WASM simulation, command-bus workflows, and module
    introspection. The browser renderer/content workflow uses high-level render
    descriptions, client-side previews, and intentional uploads.

