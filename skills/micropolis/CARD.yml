commands:
  introspection:
    - "npm run micropolis -- about --format yaml"
    - "npm run micropolis -- api --format yaml"
  city:
    - "npm run micropolis -- city dump <file.cty>"
    - "npm run micropolis -- city info <file.cty> --format yaml"
    - "npm run micropolis -- city analyze <file.cty> --format yaml"
    - "npm run micropolis -- city export <file.cty> --include-map --format yaml"
    - "npm run micropolis -- city export <file.cty> --include-map --format csv"
    - "npm run micropolis -- city edit <file.cty> --funds 50000 --tax 9"
    - "npm run micropolis -- city patch-scenario <file.cty> --dry-run"
  visualize:
    - "npm run micropolis -- visualize ascii <file.cty>"
    - "npm run micropolis -- visualize emoji <file.cty>"
    - "npm run micropolis -- visualize mono <file.cty>"
    - "npm run micropolis -- visualize map <file.cty> --style ascii"
  sim:
    - "npm run micropolis -- sim info --format yaml"
    - "npm run micropolis -- sim smoke --ticks 10 --format yaml"
  bus:
    - "npm run micropolis -- bus tools --format yaml"
    - "npm run micropolis -- bus list --format yaml"
    - "npm run micropolis -- bus preview <command-id> --actor llm --reason WHY --format yaml"
    - "npm run micropolis -- bus propose <command-id> --actor llm --reason WHY --format yaml"
    - "npm run micropolis -- bus dispatch <command-id> --source script --format yaml"
    - "npm run micropolis -- bus record-dispatch <command-id> --source script --format yaml"
    - "npm run micropolis -- bus proposals --status pending --format yaml"
    - "npm run micropolis -- bus approve <proposal-id> --actor user --format yaml"
    - "npm run micropolis -- bus reject <proposal-id> --reason WHY --format yaml"
    - "npm run micropolis -- bus recordings --format yaml"
    - "npm run micropolis -- bus recordings-jsonl"
    - "npm run micropolis -- bus recordings-clear --format yaml"
  content:
    - "npm run micropolis -- api --format yaml"
    - "browser render route consumes future render-job YAML"
    - "headless browser worker consumes same render-job YAML"

formats:
  default_llm: yaml
  structured: [json, yaml, yml]
  tabular: [csv]
  text: "human-readable terminal output"
  preferred_for_llm: yaml
  preferred_for_catalog_tables: csv

rules:
  - "Prefer the unified CLI for terminal use."
  - "Prefer direct TypeScript module imports for in-process tools."
  - "Treat MCP as an adapter over the same modules, not the center of gravity."
  - "Use `about` and `api` before guessing command shape."
  - "Use browser/client rendering for expensive previews before renting server GPUs."
  - "Upload source assets and rendered derivatives only after explicit user approval."
  - "UI-facing labels should use i18n keys; English strings are development fallbacks."
  - "Edit at the highest semantic layer possible; preserve raw bytes and provenance underneath."
  - "Keep physical I/O in adapters; parsers and render descriptions should stay browser/Node portable."
  - "Use GitHub branches/issues/PRs as multiplayer civic space: discussion, evidence, experiments, and decisions."

workflows:
  cli_introspection:
    steps:
      - "Run `npm run micropolis -- about --format yaml` for purpose, modules, formats, and examples."
      - "Run `npm run micropolis -- api --format yaml` for paths and shared module map."
  llm_static_city_analysis:
    steps:
      - "Run `npm run micropolis -- city info FILE --format yaml` for metadata."
      - "Run `npm run micropolis -- city analyze FILE --format yaml` for RCI/power/service summary."
      - "Use region bounds before exporting maps."
      - "Use CSV only for tabular/tile-grid exports."
  live_mutation:
    steps:
      - "List commands through `npm run micropolis -- bus list --format yaml`."
      - "Preview before proposal."
      - "Propose risky or LLM-originated actions."
      - "Approval executes through the command bus."
  render_catalog_preview:
    steps:
      - "Create or load high-level render description."
      - "Render in user browser with WebGPU, WebGL fallback, Canvas fallback."
      - "Let user inspect and approve."
      - "Upload approved source assets and derived preview images."
      - "Store catalog metadata, provenance, and render description."
  content_management:
    steps:
      - "Edit source objects, images, tiles, and metadata in the browser."
      - "Render previews locally without contacting the server."
      - "Store drafts locally until save/publish."
      - "Upload approved source assets and rendered derivatives intentionally."
      - "Use server catalogs for versioning, permissions, provenance, validation, and publishing."
  headless_browser_batch:
    steps:
      - "Queue render descriptions."
      - "Open the same browser render route in Playwright/Chromium."
      - "Capture images from the same renderer plugin path."
      - "Validate outputs and update catalog."
  semantic_layer_pipeline:
    steps:
      - "Treat raw save/IFF/asset bytes as ground truth."
      - "Explode resources into deterministic, big-endian named trees."
      - "Decode fields into YAML/JSON with named values and preserved unknowns."
      - "Expose semantic authoring YAML for humans and LLMs."
      - "Attach annotations/layouts/previews as additive overlays."
      - "Compile downward only through typed writers and validation."
  sims_micropolis_world_bridge:
    steps:
      - "Use SimObliterator/VitaMoo contracts for Sims save, character, object, and animation data."
      - "Use Micropolis CLI/WASM contracts for city maps, simulation, commands, and overlays."
      - "Represent cross-world content as browser-editable source assets plus render descriptions."
      - "Use CHARACTER.yml / OBJECT.yml / city package YAML as MOOLLM-facing semantic layers."
      - "Use command bus, action queue, and object advertisements for user/agent actions."
      - "Publish only approved catalog artifacts and preserve provenance."
  github_mmorpg_civic_play:
    steps:
      - "Store cities, proposals, issues, experiments, and evidence as Git branches or nested object trees."
      - "Use branches like `city_<id>`, `issue_<id>`, `proposal_<id>`, `experiment_<id>`."
      - "Use GitHub issues for discussion, voting, tutor debate, and civic explanation."
      - "Run alternate-timeline experiments on branches and commit evidence files."
      - "Use PRs to compare and merge or reject proposed futures."
      - "Teach GitHub by making it the multiplayer constructionist city hall."

