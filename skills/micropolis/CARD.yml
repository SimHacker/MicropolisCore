    - "city subcommands: dump, export, info, analyze, edit, patch-scenario"
    - "visualize subcommands: ascii, emoji, mono, map"
    - "sim subcommands: info, smoke"
    - "bus subcommands expose command-list, preview, proposal, dispatch, and recording workflows"
    - "Structured output supports json/yaml; city export supports csv when tabular"
    - "WASM loaders are factored under src/lib/wasm for browser, Node, heap views, and callbacks"
    - "Renderer roadmap keeps WebGL, Canvas, WebGPU, pie menus, client-side previews, and headless-browser batch rendering"

