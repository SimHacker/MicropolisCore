# CARD.yml — Micropolis Engine
# Ultra-dense interface card generated from:
#   - micropolis/scripts/micropolis.js yargs command tree
#   - micropolis/scripts/constants.js
#   - micropolis/src/types/micropolisengine.d.ts
#   - MicropolisEngine/src/emscripten.cpp
#   - Cursor/city-save-files.md
# Full protocol: SKILL.md | Human overview: README.md

card:
  id: micropolis
  name: "Micropolis Engine"
  type: [skill, simulation, engine, cli, save-file, wasm, education, microworld]
  emoji: 🏙️
  tier: 2
  status: implementing
  rarity: legendary
  tagline: "The engine is the microworld. The CLI is the public gate."
  description: |
    Engine-level interface for MicropolisCore. Exposes the current, real
    save-file CLI, static city-file analysis, terminal visualizations,
    JSON export, metadata editing, scenario patching, the C++/WASM Embind
    surface, and delegation boundaries for live commands, Git multiverse,
    experiments, UI workspaces, and AI tutors.

evidence:
  cli_source: "../../micropolis/scripts/micropolis.js"
  cli_docs: "../../micropolis/scripts/README.md"
  constants_source: "../../micropolis/scripts/constants.js"
  wasm_bindings: "../../MicropolisEngine/src/emscripten.cpp"
  typescript_bindings: "../../micropolis/src/types/micropolisengine.d.ts"
  save_file_reference: "../../Cursor/city-save-files.md"
  checked_facts:
    - "setupCLI() defines top-level yargs commands: city, visualize"
    - "city subcommands: dump, export, info, analyze, edit, patch-scenario"
    - "visualize subcommands: ascii, emoji, mono, map, filter"
    - "CSV export prints 'CSV export not yet implemented'"
    - "visualize map is labeled not yet implemented but renders by style"
    - "visualize filter warns runtime overlay data is not stored in .cty files"
    - "CityFile exports: CityFile, ScenarioDefaults, getScenarioDefaults, World, TileBits, Endian"
    - "Save files: .cty 27,120 bytes, .mop 51,120 bytes"

