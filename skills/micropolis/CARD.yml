time_travel_roadmap:
  status: planned
  do_not_implement_yet: true
  name: "TiVo for Micropolis"
  principle: |
    Treat every human, LLM, tool, or multiplayer edit command as a universe
    branch point. Persist a tree of commands plus periodic differential
    snapshots. Rewind to any checkpoint, replay forward astronomically fast,
    pause at an edit point, and fork a new branch.
  units:
    command: "CommandBus command id + args + actor + reason + preview + result"
    timestamped_command_file: "Sortable command record that Git can merge and Micropolis can replay"
    leaf: "Coalesced command run stored inside save directory and committed periodically"
    attribution_sidecar: "Post-commit file with same leaf prefix mapping command indices to effect commit hash"
    edit_point: "A mutation command that can become a branch point"
    checkpoint: "Full or differential snapshot of city/simulator state"
    branch: "Alternate timeline beginning at a checkpoint or edit point"
    replay: "Deterministic fast-forward from checkpoint through command log"
    weave: "Combine command histories from multiple branches, then replay semantically"
    blueprint: "Relative command stream with an anchor, transform, and replay policy"
    macro_cursor: "Replay origin that can advance by a declared stride after playback"
    visual_program: "Snap!/Logo/Scratch-like source that generates or transforms command streams"
    overlay_materialization: "Run enough sim phases to reconstruct selected runtime maps"
  live_play_model:
    browser: "Runs the real-time simulator for interactive play and previews"
    command_recorder: "Writes timestamped command files as players act"
    player_branch: "Receives commits from one player or group during live play"
    shared_branch: "May accept near-real-time merges or slower reviewed PRs"
    github_actions: "Replays, validates, compares, materializes, and publishes branch state"
    teaching_goal: "Teach Git world model and GitHub collaboration through branches, commits, rebases, merges, PRs, and issues"
  git_model:
    branch_pattern: "<type>_<id>"
    example_branch: "micropolis_971987439573945"
    world_state: "A Micropolis namespace/object store in a GitHub repository branch, rooted by MICROPOLIS.yml"
    object_storage_rule: "A branch named <type>_<id> is a typed object storage scope; plural directories are collection namespaces"
    branch_forms:
      container_object: "micropolis_<id> branch rooted by MICROPOLIS.yml with plural collection namespaces"
      naked_object: "city_<id>, macro_<id>, blueprint_<id>, catalog_<id>, or other typed branch rooted by that object's interface file"
      naked_collection: "cities_<id>, macros_<id>, blueprints_<id>, or other plural collection branch rooted by INDEX.yml, CITIES.yml, MACROS.yml, BLUEPRINTS.yml, or a naked child-object directory"
    collection_interfaces: [INDEX.yml, CITIES.yml, MACROS.yml, BLUEPRINTS.yml, CATALOG.yml]
    manifest_role: "MANIFEST.yml imports, mounts, mirrors, vendors, or instantiates naked object or collection branches into container objects or catalogs"
    import_modes: [reference, mirror, vendor, instantiate]
    readme_convention: "Every meaningful object directory should usually have README.md as a GitHub-rendered human view generated from structured sources of truth"
    readme_sources: [interface-yml, MANIFEST.yml, OBJECT.yml, metadata.yml, commands.jsonl, timeline, reports, previews, issue-links]
    branch_interface: "MICROPOLIS.yml"
    branch_collections: [cities, macros, blueprints, prototypes, tools, tutors, issues, reports, dialogs, policies]
    city_namespace: "cities/"
    city_local_collections: [timeline, layers, annotations, dialogs, proposals, behaviors, snapshots, reports, neighborhoods]
    branch_scope_examples: [macros, blueprints, shared-tools, prototypes, tutors, policies, issue-objects, branch-reports]
    global_scope_examples: [main-branch-defaults, course-repo-templates, public-blueprint-libraries, external-skill-repos, other-micropolis-branches]
    city_interface: "CITY.yml"
    city_name_mapping: "Classic SimCity save filename without suffix maps to cities/<name>/ within the branch"
    city_payload: "Classic .cty/.mop payloads live inside their named city directory, not as generic root city.cty files"
    commit_policy: "Coalesce cheap commands; force commits before consequential decisions"
    internal_split: "Leaves preserve command boundaries so users can branch inside a coalesced commit by replaying up to the split command"
    ex_post_facto_attribution: "Effect commit hashes are written in the next commit or final session-closing commit because commands cannot know their own future commit id"
  coalescing_policy:
    greedy: [road-drag, rail-drag, wire-drag, chalk-stroke, panning, zooming, repeated-tool-application, minor-ui-layout]
    force_commit_before: [month-change, tax-change, budget-change, build-stadium, build-airport, build-seaport, build-power-plant, trigger-disaster, approve-proposal, merge-timeline, role-permission-change, llm-proposal-execution]
    triggers: [max-command-count, max-real-time, idle-timeout, manual-checkpoint, before-consequential-command]
  future_cli_methods:
    TIMELINE-RECORD:
      signature: "TIMELINE-RECORD [city] --command-log <jsonl>"
      status: planned
    TIMELINE-REPLAY:
      signature: "TIMELINE-REPLAY [checkpoint] --edits <jsonl> --until <tick|edit-id>"
      status: planned
    TIMELINE-BRANCH:
      signature: "TIMELINE-BRANCH [edit-id] --name <branch-name>"
      status: planned
    TIMELINE-MERGE:
      signature: "TIMELINE-MERGE [city-dir] --ours <branch> --theirs <branch>"
      status: planned
      purpose: "Merge command files with Git, then replay to detect semantic conflicts"
    TIMELINE-REBASE:
      signature: "TIMELINE-REBASE [city-dir] --branch <experiment> --onto <base>"
      status: planned
      purpose: "Replay an experimental branch's commands on top of a newer world"
    TIMELINE-WEAVE:
      signature: "TIMELINE-WEAVE [city-dir] --inputs <branch...> --policy <policy.yml>"
      status: planned
      purpose: "Combine multiple command histories into an explicit proposed timeline"
    TIMELINE-CONFLICTS:
      signature: "TIMELINE-CONFLICTS [city-dir]"
      status: planned
      purpose: "List semantic conflicts produced by replay"
    TIMELINE-RESOLVE:
      signature: "TIMELINE-RESOLVE [city-dir] --conflict <id> --command <resolution.yml>"
      status: planned
      purpose: "Resolve a semantic timeline conflict by adding an explicit command"
    TIMELINE-REWRITE:
      signature: "TIMELINE-REWRITE [city-dir] --from <command-id> --script <rewrite.ts>"
      status: planned
      purpose: "Rewrite history visibly, preserving old ids, new ids, actor, reason, and audit trail"
    TIMELINE-REPAIR-SIDECARS:
      signature: "TIMELINE-REPAIR-SIDECARS [city-dir]"
      status: planned
      purpose: "Rebuild post-commit attribution sidecars by scanning Git history"
    BLUEPRINT-RECORD:
      signature: "BLUEPRINT-RECORD [city-dir] --from <command-id> --to <command-id> --origin <x,y> --name <name>"
      status: planned
      purpose: "Capture a relative command stream as a reusable blueprint or macro"
    BLUEPRINT-PLAY:
      signature: "BLUEPRINT-PLAY [city-dir] --blueprint <id> --at <x,y> --rotate <deg> --mode instant|animated --speed <factor>"
      status: planned
      purpose: "Replay a transformed command template as explicit command records"
    BLUEPRINT-PREVIEW:
      signature: "BLUEPRINT-PREVIEW [city-dir] --blueprint <id> --at <x,y> --rotate <deg>"
      status: planned
      purpose: "Preview transformed command playback before committing it"
    MACRO-REPEAT:
      signature: "MACRO-REPEAT [city-dir] --macro <id> --cursor <x,y> --count <n>"
      status: planned
      purpose: "Replay a macro repeatedly, advancing the cursor by its declared end offset or stride"
    VISUAL-PROGRAM-GENERATE:
      signature: "VISUAL-PROGRAM-GENERATE [city-dir] --source <snap|logo|blocks-file> --params <json> --output <blueprint-id>"
      status: planned
      purpose: "Run a visual/constructionist program that emits a parameterized command stream blueprint"
    VISUAL-PROGRAM-TRANSFORM:
      signature: "VISUAL-PROGRAM-TRANSFORM [city-dir] --blueprint <id> --program <snap|logo|blocks-file> --output <blueprint-id>"
      status: planned
      purpose: "Transform an existing recorded macro or blueprint with a visual program while preserving provenance"
    SNAPSHOT-DIFF:
      signature: "SNAPSHOT-DIFF [from] [to]"
      status: planned
    OVERLAY-REGENERATE:
      signature: "OVERLAY-REGENERATE [checkpoint] --edits <jsonl> --map traffic|growth|pollution|crime|landvalue|police|fire"
      status: planned

