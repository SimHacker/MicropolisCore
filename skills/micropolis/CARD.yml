invoke_when:
  - "Need to inspect, analyze, visualize, export, or edit a .cty/.mop file"
  - "Need machine-readable Micropolis data for an LLM, MCP tool, script, or test"
  - "Need to understand the current CLI surface exactly"
  - "Need to locate engine/WASM bindings and callback surface"
  - "Need to decide whether to delegate to command-bus, experiment, github, overlays, or save-format sub-skills"

advertisements:
  INSPECT-CITY:
    score: 100
    condition: "Need metadata, funds, time, tax, flags, funding, region, zone counts"
    methods: [CITY-INFO, CITY-ANALYZE, FILE-DUMP]
    primary_tool: "npm run micropolis -- city info <file> --format json"

  EXPORT-FOR-AI:
    score: 98
    condition: "Need structured JSON for LLM analysis, scripts, tests, or ML"
    methods: [CITY-EXPORT]
    primary_tool: "npm run micropolis -- city export <file> --format json --include-map"
    caveat: "CSV choice exists but is not implemented."

  TERMINAL-MAP:
    score: 95
    condition: "Need a readable city preview in terminal/chat/markdown"
    methods: [VISUALIZE-ASCII, VISUALIZE-MONO, VISUALIZE-EMOJI, VISUALIZE-MAP]
    primary_tool: "npm run micropolis -- visualize ascii <file> --row R --col C --width W --height H"

  FILTER-MAP:
    score: 70
    condition: "Need to express desired overlay filters over population/growth/traffic/pollution/crime/landvalue/police/fire"
    methods: [VISUALIZE-FILTER]
    caveat: |
      .cty/.mop files store some evidence but not the full runtime overlay maps.
      Saved main map tiles include terrain/zones/infrastructure plus visual traffic
      tile variants and PWRBIT/CONDBIT/ZONEBIT/etc. History arrays include crime
      and pollution time-series. .mop stores an extra 120x100 short map, currently
      treated by the web renderer as mop/tile-layer data, not the simulator's
      population/traffic/pollution/crime/landvalue/police/fire analysis maps.
      Runtime maps must be regenerated by running simulator scans.

  REGENERATE-RUNTIME-MAPS:
    score: 82
    condition: "Need overlay maps that depend on simulation history, smoothing, decay, or accumulated effects"
    status: planned
    caveat: |
      Some runtime maps are not exact functions of one static .cty snapshot.
      Traffic density, rate of growth, service effects, and other smoothed or
      decayed maps may require rewinding to an earlier checkpoint and replaying
      the edit/command timeline forward. Future CLI should support TiVo-style
      rewind, fast-forward, differential snapshots, and edit-tree branch points.
    delegate:
      skill: experiment
      reason: "Overlay regeneration is a replay experiment over a timeline."

  COMPUTED-LAYER-CLI:
    score: 88
    condition: "Need to read, dump, export, or visualize computed simulator layers as easily as saved layers"
    status: planned
    methods: [LAYER-DUMP, LAYER-EXPORT, LAYER-VISUALIZE]
    principle: |
      CLI users should not care whether a layer is saved in .cty/.mop or
      computed by the simulator. The CLI should provide one layer interface,
      automatically call the minimal required analysis scans, and only fall
      back to time-travel replay when exact reconstruction needs prior history.

  EDIT-METADATA:
    score: 80
    condition: "Need to patch save-file metadata fields such as funds, time, tax, speed, flags, funding"
    risk: reversible
    methods: [CITY-EDIT, PATCH-SCENARIO]
    advice: "Use --output for non-destructive edits; use --dry-run for patch-scenario."

  LIVE-SIMULATION-ACTION:
    score: 100
    condition: "Need to mutate a running WASM simulation, UI view, workspace, command, or GitHub state"
    delegate:
      skill: micropolis-command-bus
      reason: "Live actions require command preview/propose/approval."

  ENGINE-BINDINGS:
    score: 90
    condition: "Need callable C++/WASM functions, properties, enums, callbacks"
    methods: [WASM-SURFACE, CALLBACK-SURFACE, ENUM-SURFACE]

  FACTOR-SUBSKILL:
    score: 85
    condition: "Capability is growing its own CLI, TypeScript module, data format, MCP tool, or protocol"
    delegate:
      skill: skill
      reason: "Factor into a sub-skill with GLANCE/CARD/SKILL/README."

runtime:
  working_directory: "MicropolisCore/micropolis"
  package_scripts:
    micropolis: "node scripts/micropolis.js"
    micropolis_info: "node scripts/micropolis.js city info"
    micropolis_analyze: "node scripts/micropolis.js city analyze"
    micropolis_visualize: "node scripts/micropolis.js visualize ascii"
    micropolis_export: "node scripts/micropolis.js file export # package script is stale; CLI uses city export"
    micropolis_dump: "node scripts/micropolis.js file dump # package script is stale; CLI uses city dump"
    commands: "tsx scripts/commands.ts"
  file_arguments:
    stdin: "-"
    examples_root: "../resources/cities"
    scenario_example: "../resources/cities/scenario_tokyo.cty"
  global_options:
    verbose:
      flags: [-v, --verbose]
      type: boolean
      meaning: "Run with verbose logging"
  region_options:
    applies_to: [city-export, city-info, city-analyze, visualize-ascii, visualize-emoji, visualize-mono, visualize-map, visualize-filter]
    row: { flag: "--row", type: number, default: 0, range: "0..99", meaning: "Starting row/Y" }
    col: { flag: "--col", type: number, default: 0, range: "0..119", meaning: "Starting column/X" }
    width: { flag: "--width", type: number, default: 120, meaning: "Region width in tiles; clipped to map" }
    height: { flag: "--height", type: number, default: 100, meaning: "Region height in tiles; clipped to map" }

methods:
  FILE-DUMP:
    actual_command: "city dump [file]"
    run: "cd micropolis && npm run micropolis -- city dump <file>"
    file_default: "-"
    options:
      brief: { flags: [-b, --brief], type: boolean, default: false, meaning: "Show only summary information" }
    output: "Section-by-section big-endian raw dump; samples first 160 bytes per section unless --brief"
    source: "micropolis/scripts/micropolis.js:1317"

  CITY-EXPORT:
    actual_command: "city export [file]"
    run: "cd micropolis && npm run micropolis -- city export <file> --format json"
    file_default: "-"
    options:
      format: { flags: [-f, --format], choices: [json, csv], default: json, caveat: "csv prints not yet implemented" }
      include_map: { flag: "--include-map", type: boolean, default: false, meaning: "Include region tile grid as map[][]" }
      output: { flags: [-o, --output], type: string, meaning: "Write JSON to path instead of stdout" }
      region: "*region_options"
    output_schema:
      metadata: "*metadata_schema"
      region: { startRow: number, startCol: number, width: number, height: number }
      zones: "*zone_counts_schema"
      poweredBuildings: number
      conductiveBuildings: number
      flammableBuildings: number
      zoneCount: number
      map: "optional number[][] of tile values"
    source: "micropolis/scripts/micropolis.js:1373,1151"

  CITY-INFO:
    actual_command: "city info [file]"
    run: "cd micropolis && npm run micropolis -- city info <file> --format json"
    file_default: "-"
    options:
      format: { flags: [-f, --format], choices: [text, json], default: text }
      region: "*region_options"
    output_json: { metadata: "*metadata_schema", region: object, zoneCounts: "*zone_counts_schema" }
    output_text: "File size, city time/year, funds, tax, speed, funding, flags, zone counts"
    source: "micropolis/scripts/micropolis.js:1426"

  CITY-ANALYZE:
    actual_command: "city analyze [file]"
    run: "cd micropolis && npm run micropolis -- city analyze <file> --format json"
    file_default: "-"
    options:
      format: { flags: [-f, --format], choices: [text, json], default: text }
      region: "*region_options"
    output_json:
      metadata: "*metadata_schema"
      region: object
      rci: { residential: number, commercial: number, industrial: number }
      power: { coalPlants: number, nuclearPlants: number, poweredTiles: number, conductiveTiles: number, connectivity: number }
      services: { police: object, fire: object, transportation: object }
    source: "micropolis/scripts/micropolis.js:1517"

  CITY-EDIT:
    actual_command: "city edit <file>"
    risk: reversible
    run: "cd micropolis && npm run micropolis -- city edit <file> --output <copy.cty> [edits]"
    options:
      output: { flags: [-o, --output], type: string, meaning: "Write to different file; safer than in-place" }
      funds: { flag: "--funds", type: number }
      year: { flag: "--year", type: number, meaning: "Converted to cityTime=((year-1900)*48)+2" }
      city_time: { flag: "--city-time", type: number, meaning: "Raw city time ticks" }
      tax: { flag: "--tax", type: number, range: "0..20" }
      speed: { flag: "--speed", type: number, range: "0..3" }
      police_funding: { flag: "--police-funding", type: number, range: "0..100", stored_as: "fixed 16.16 percent /100" }
      fire_funding: { flag: "--fire-funding", type: number, range: "0..100" }
      road_funding: { flag: "--road-funding", type: number, range: "0..100" }
      auto_bulldoze: { flag: "--auto-bulldoze", type: boolean }
      auto_budget: { flag: "--auto-budget", type: boolean }
      auto_goto: { flag: "--auto-goto", type: boolean }
      sound: { flag: "--sound", type: boolean }
    output: "Writes file, then prints changed fields and summary"
    source: "micropolis/scripts/micropolis.js:1643"

  PATCH-SCENARIO:
    actual_command: "city patch-scenario <file>"
    risk: reversible
    run: "cd micropolis && npm run micropolis -- city patch-scenario <file> --dry-run"
    options:
      output: { flags: [-o, --output], type: string }
      dry_run: { flag: "--dry-run", type: boolean, default: false }
    behavior: "Applies ScenarioDefaults + common settings matching C++ loadScenario behavior"
    known_scenarios: [scenario_dullsville.cty, scenario_san_francisco.cty, scenario_hamburg.cty, scenario_bern.cty, scenario_tokyo.cty, scenario_detroit.cty, scenario_boston.cty, scenario_rio_de_janeiro.cty]
    source: "micropolis/scripts/micropolis.js:1754"

  VISUALIZE-ASCII:
    actual_command: "visualize ascii [file]"
    run: "cd micropolis && npm run micropolis -- visualize ascii <file>"
    options: { region: "*region_options" }
    output: "ASCII map from generateAsciiMapForRegion"
    source: "micropolis/scripts/micropolis.js:1837"

  VISUALIZE-EMOJI:
    actual_command: "visualize emoji [file]"
    run: "cd micropolis && npm run micropolis -- visualize emoji <file>"
    options: { region: "*region_options" }
    output: "Emoji map from generateEmojiMapForRegion"
    source: "micropolis/scripts/micropolis.js:1871"

  VISUALIZE-MONO:
    actual_command: "visualize mono [file]"
    run: "cd micropolis && npm run micropolis -- visualize mono <file>"
    options: { region: "*region_options" }
    output: "Monospace map from generateMonoMapForRegion"
    source: "micropolis/scripts/micropolis.js:1905"

  VISUALIZE-MAP:
    actual_command: "visualize map [file]"
    status: "partially implemented despite help saying not yet implemented"
    run: "cd micropolis && npm run micropolis -- visualize map <file> --style ascii --overlay all"
    options:
      style: { choices: [ascii, emoji, mono], default: ascii }
      overlay: { choices: [all, traffic, pollution, landvalue], default: all, caveat: "overlay option currently does not affect rendering" }
      region: "*region_options"
    output: "Delegates to ascii/emoji/mono generator by style"
    source: "micropolis/scripts/micropolis.js:1939"

  VISUALIZE-FILTER:
    actual_command: "visualize filter [file]"
    status: "documented stub; prints warning; dynamicFilter currently always true"
    run: "cd micropolis && npm run micropolis -- visualize filter <file> --style ascii"
    options:
      style: { choices: [ascii, emoji, mono], default: ascii }
      population_min: { flag: "--population-min", default: 0 }
      population_max: { flag: "--population-max", default: 255 }
      growth_min: { flag: "--growth-min", default: -256 }
      growth_max: { flag: "--growth-max", default: 255 }
      traffic_min: { flag: "--traffic-min", default: 0 }
      traffic_max: { flag: "--traffic-max", default: 255 }
      pollution_min: { flag: "--pollution-min", default: 0 }
      pollution_max: { flag: "--pollution-max", default: 255 }
      crime_min: { flag: "--crime-min", default: 0 }
      crime_max: { flag: "--crime-max", default: 255 }
      landvalue_min: { flag: "--landvalue-min", default: 0 }
      landvalue_max: { flag: "--landvalue-max", default: 255 }
      police_min: { flag: "--police-min", default: 0 }
      police_max: { flag: "--police-max", default: 255 }
      fire_min: { flag: "--fire-min", default: 0 }
      fire_max: { flag: "--fire-max", default: 255 }
      region: "*region_options"
    caveat: |
      Current implementation does not read or regenerate runtime analysis maps.
      It returns the base map. However, some traffic is visible in saved road tile
      variants, and crime/pollution histories are saved as graph data. Full
      population/traffic/pollution/crime/landvalue/police/fire overlay filtering
      needs a live or headless Micropolis engine pass to populate the runtime maps.
    source: "micropolis/scripts/micropolis.js:1998,1192"

  LAYER-DUMP:
    actual_command: "layer dump [file] --layer <name>"
    status: planned
    run: "cd micropolis && npm run micropolis -- layer dump <file> --layer traffic --compute"
    output: "Raw saved or computed layer values with region support"
    note: "Unifies saved map/mop/history layers and computed runtime analysis maps."

  LAYER-EXPORT:
    actual_command: "layer export [file] --layer <name> --format json"
    status: planned
    run: "cd micropolis && npm run micropolis -- layer export <file> --layer pollution --format json --compute"
    output: "JSON/CSV layer data for tools and LLMs"

  LAYER-VISUALIZE:
    actual_command: "layer visualize [file] --layer <name> --style ascii|emoji|mono"
    status: planned
    run: "cd micropolis && npm run micropolis -- layer visualize <file> --layer landvalue --style ascii --compute"
    output: "Human-readable layer map"

  COMMAND-BUS:
    actual_command: "npm run commands -- <list|preview|propose|dispatch|proposals|approve|reject>"
    delegate: micropolis-command-bus
    status: "implemented"
    output: "command metadata, preview, proposal, approval/rejection, or dispatch result"

schemas:
  save_file:
    extensions:
      cty:
        size_bytes: 27120
        sections: [history_3120, map_24000]
      mop:
        size_bytes: 51120
        sections: [history_3120, map_24000, overlay_24000]
    endian: big
    world: { width: 120, height: 100, tile_count: 12000, tile_size_bytes: 2, starting_year: 1900 }
    sections:
      history:
        size_bytes: 3120
        arrays:
          resHist: { bytes: 480, shorts: 240 }
          comHist: { bytes: 480, shorts: 240 }
          indHist: { bytes: 480, shorts: 240 }
          crimeHist: { bytes: 480, shorts: 240 }
          pollutionHist: { bytes: 480, shorts: 240 }
          moneyHist: { bytes: 480, shorts: 240 }
          miscHist: { bytes: 240, shorts: 120 }
      map:
        size_bytes: 24000
        layout: "row-major 120x100 16-bit tiles"
      overlay:
        size_bytes: 24000
        optional: true
        name_in_engine: mop
        note: "Extra 120x100 short map saved in .mop files; not the same as runtime analysis maps."
    tile_bits:
      LOMASK: { hex: "0x03ff", bit_range: "0..9", meaning: "base tile id 0..1023" }
      ZONEBIT: { hex: "0x0400", bit: 10, meaning: "zone center" }
      ANIMBIT: { hex: "0x0800", bit: 11, meaning: "animated" }
      BULLBIT: { hex: "0x1000", bit: 12, meaning: "bulldozable" }
      BURNBIT: { hex: "0x2000", bit: 13, meaning: "flammable" }
      CONDBIT: { hex: "0x4000", bit: 14, meaning: "conducts power" }
      PWRBIT: { hex: "0x8000", bit: 15, meaning: "powered" }
    misc_history_indices:
      city_time: { shorts: [8, 9], type: int32, formula_year: "floor(max(0, cityTime) / 48) + 1900" }
      funds: { shorts: [50, 51], type: int32 }
      auto_bulldoze: { short: 52, type: bool }
      auto_budget: { short: 53, type: bool }
      auto_goto: { short: 54, type: bool }
      sound_enabled: { short: 55, type: bool }
      city_tax: { short: 56, type: int16, runtime_clamp: "invalid -> 7" }
      sim_speed: { short: 57, type: int16, runtime_clamp: "invalid -> 3" }
      police_funding: { shorts: [58, 59], type: fixed_16_16_percent, valid_range: "0.0..1.0 else null in CLI metadata" }
      fire_funding: { shorts: [60, 61], type: fixed_16_16_percent }
      road_funding: { shorts: [62, 63], type: fixed_16_16_percent }

  persistence_reality:
    saved_directly:
      - "resHist/comHist/indHist/crimeHist/pollutionHist/moneyHist time-series"
      - "miscHist settings: cityTime, funds, options, tax, speed, funding"
      - "main map[120][100]: tile id plus ZONEBIT/ANIMBIT/BULLBIT/BURNBIT/CONDBIT/PWRBIT"
      - "traffic visual state encoded in road tile variants when map tiles have been updated from trafficDensityMap"
      - ".mop optional mop[120][100] short map"
    not_saved_as_runtime_maps:
      - "populationDensityMap (MapByte2 60x50)"
      - "trafficDensityMap (MapByte2 60x50)"
      - "pollutionDensityMap (MapByte2 60x50)"
      - "landValueMap (MapByte2 60x50)"
      - "crimeRateMap (MapByte2 60x50)"
      - "terrainDensityMap (MapByte4 30x25)"
      - "powerGridMap (MapByte1 120x100)"
      - "rateOfGrowthMap (MapShort8 15x13-ish/world blocksize 8)"
      - "fireStationMap/fireStationEffectMap (MapShort8)"
      - "policeStationMap/policeStationEffectMap (MapShort8)"
      - "comRateMap (MapShort8)"
    regeneratable_by_engine:
      immediate_special_init:
        source: "simulate.cpp doSimInit/SpecialInit path"
        scans: [mapScan, doPowerScan, pollutionTerrainLandValueScan, crimeScan, populationDensityScan, fireAnalysis]
        caveat: "Useful for approximate/current-state rebuilds; not guaranteed to reproduce historically accumulated runtime maps."
      incremental_runtime:
        source: "simulate.cpp simFrame phases"
        scans:
          traffic_decay: "decTrafficMap updates trafficDensityMap and marks traffic/road/all/res/com/ind/dynamic map flags"
          power: "doPowerScan populates powerGridMap and later PWRBIT on conductive zones"
          pollution_landvalue: "pollutionTerrainLandValueScan computes pollutionDensityMap, landValueMap, terrainDensityMap"
          crime: "crimeScan computes crimeRateMap and policeStationEffectMap"
          population_growth: "populationDensityScan computes populationDensityMap and rateOfGrowthMap"
          fire: "fireAnalysis computes fireStationEffectMap"
      historical_replay_needed:
        why: |
          Some overlay maps integrate over time or decay/update incrementally
          after edits and simulation ticks. Exact regeneration may require
          rewinding to a checkpoint and replaying the edit/command tree.
        future_cli: "checkpoint -> replay edits/commands -> run sim fast -> materialize requested runtime maps"

  layer_interface_roadmap:
    status: planned
    do_not_implement_yet: true
    goal: "Computed layers should feel like saved layers."
    layer_classes:
      saved:
        examples: [map, mop, resHist, comHist, indHist, crimeHist, pollutionHist, moneyHist, miscHist]
        source: ".cty/.mop bytes"
      extended_saved:
        examples: [analysis-maps, chalk, annotations, signs, named-regions, routes, planned-work, behaviors, multiplayer-dialogs, llm-proposals, audit-logs]
        source: "future layered save document around the classic city"
      derived_from_saved_tiles:
        examples: [zone-counts, traffic-tile-variants, power-flags, tile-bit-masks]
        source: "main map tile ids and flags"
      computed_current_state:
        examples: [powerGridMap, populationDensityMap, pollutionDensityMap, landValueMap, crimeRateMap, fireStationEffectMap, policeStationEffectMap]
        source: "load city into engine and run required scans"
      computed_history_dependent:
        examples: [trafficDensityMap, rateOfGrowthMap, decay/smoothing-sensitive views]
        source: "checkpoint + edit log replay may be required for exact reconstruction"
    dependency_planner:
      purpose: "Map requested layer names to minimal engine scans."
      examples:
        traffic: [mapScan, "decTrafficMap?"]
        power: [doPowerScan]
        pollution: [pollutionTerrainLandValueScan]
        landvalue: [pollutionTerrainLandValueScan]
        crime: [pollutionTerrainLandValueScan, crimeScan]
        population: [mapScan, populationDensityScan]
